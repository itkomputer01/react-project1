name: Deploy React to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "🚀 START DEPLOY"

            cd /var/www/kursusweb/frontend

            echo "🧹 CLEAN REPO"
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "📦 LOAD NVM & ENVIRONMENT"
            # 1. Muat konfigurasi shell bawaan VPS agar path bawaan terbaca
            export PATH=$PATH:/usr/bin:/usr/local/bin
            
            # 2. Muat NVM (Node Version Manager) secara manual jika Anda menggunakannya
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "🔍 CHECK NODE VERSION"
            node -v
            npm -v

            echo "📥 INSTALL DEPENDENCIES"
            npm install

            echo "🏗 BUILD REACT"
            npm run build

            echo "✅ DEPLOY SUCCESS"
